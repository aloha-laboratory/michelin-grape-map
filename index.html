<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fafafa; color: #333; }
#map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
#topbar { position: fixed; top: env(safe-area-inset-top, 0); left: 0; right: 0; z-index: 1000; padding: 12px 16px 0; pointer-events: none; }
#title-card { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 14px; padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); pointer-events: auto; }
#title-card h1 { font-size: 17px; font-weight: 700; color: #8b1a2b; letter-spacing: 1.5px; text-transform: uppercase; }
#title-card p { font-size: 11px; color: #999; margin-top: 2px; letter-spacing: 0.5px; }
#filter-bar { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 72px); left: 0; right: 0; z-index: 1000; padding: 0 16px; pointer-events: none; }
#filter-scroll { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; pointer-events: auto; padding: 4px 0; }
#filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip { flex-shrink: 0; padding: 7px 14px; border: none; border-radius: 20px; background: rgba(255,255,255,0.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: 0 1px 6px rgba(0,0,0,0.08); color: #666; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
.filter-chip.active { background: #8b1a2b; color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(139,26,43,0.3); }

/* Sheet */
#sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 1000; background: #fff; border-radius: 18px 18px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); height: 80vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom, 0); }
#sheet.peek { transform: translateY(calc(100% - 140px)); }
#sheet.half { transform: translateY(calc(100% - 50vh)); }
#sheet.full { transform: translateY(0); }
#sheet-handle { display: flex; justify-content: center; padding: 10px 0 6px; cursor: grab; }
#sheet-handle .bar { width: 36px; height: 4px; border-radius: 2px; background: #d0d0d0; }
#sheet-header { padding: 0 20px 12px; }
#sheet-stats { font-size: 12px; color: #999; margin-bottom: 8px; }
#sheet-content { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }

/* List view */
.estate-item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: background 0.15s; gap: 12px; }
.estate-item:active { background: #f7f3f0; }
.estate-item.highlight { background: #fdf6f0; }
.estate-grade-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; }
.estate-info { flex: 1; min-width: 0; }
.estate-name { font-size: 15px; font-weight: 600; color: #2c2c2c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.estate-meta { font-size: 12px; color: #999; margin-top: 2px; }
.grape-badge { flex-shrink: 0; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.grape-3 { background: #fdf6e3; color: #b8860b; }
.grape-2 { background: #f3eeff; color: #7c3aed; }
.grape-1 { background: #eff6ff; color: #2563eb; }
.grape-s { background: #ecfdf5; color: #059669; }

/* Detail view */
#detail-view { display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#detail-view.show { display: flex; }
.detail-back { display: flex; align-items: center; gap: 6px; padding: 12px 20px; color: #8b1a2b; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 1px solid #f2f2f2; }
.detail-back:active { background: #f7f3f0; }
.detail-header { padding: 16px 20px; border-bottom: 1px solid #f2f2f2; }
.detail-header .d-name { font-size: 20px; font-weight: 700; color: #222; }
.detail-header .d-aoc { font-size: 13px; color: #888; margin-top: 4px; }
.detail-header .d-badge { margin-top: 8px; display: inline-block; }
.detail-section { padding: 14px 20px; }
.detail-section h3 { font-size: 13px; font-weight: 700; color: #8b1a2b; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.vineyard-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f8f8f8; }
.vineyard-item:last-child { border-bottom: none; }
.vy-type { flex-shrink: 0; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; min-width: 28px; text-align: center; }
.vy-gc { background: #8b1a2b; color: #fff; }
.vy-1er { background: #f0e6d3; color: #8b6914; }
.vy-v { background: #eee; color: #777; }
.vy-name { font-size: 14px; color: #333; line-height: 1.4; }

/* FABs */
.fab-group { position: fixed; right: 16px; z-index: 999; display: flex; flex-direction: column; gap: 10px; bottom: 152px; }
.fab-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; color: #555; }
.fab-btn:active { transform: scale(0.9); }
.fab-btn.on { background: #8b1a2b; color: #fff; }

#legend-panel { position: fixed; bottom: 260px; right: 16px; z-index: 999; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 14px; padding: 14px 18px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); font-size: 12px; line-height: 22px; color: #555; display: none; max-height: 60vh; overflow-y: auto; }
#legend-panel.show { display: block; }
#legend-panel h4 { color: #8b1a2b; margin-bottom: 4px; font-size: 12px; font-weight: 700; }
#legend-panel .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
#legend-panel .swatch { display: inline-block; width: 16px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: middle; opacity: 0.6; }
#legend-panel hr { border: none; border-top: 1px solid #eee; margin: 6px 0; }

.leaflet-control-zoom { display: none; }
.leaflet-control-attribution { font-size: 9px !important; background: rgba(255,255,255,0.7) !important; padding: 2px 6px !important; }
.gc-label { font-size: 9px; font-weight: 700; color: #8b1a2b; letter-spacing: 0.5px; white-space: nowrap; text-shadow: 0 0 3px #fff, 0 0 6px #fff, 0 0 9px #fff; pointer-events: none; }

@media (min-width: 769px) {
  #topbar { left: 400px; } #filter-bar { left: 400px; }
  #sheet { left:0; width:400px; top:0; bottom:0; border-radius:0; max-height:100vh; transform:none!important; box-shadow:2px 0 12px rgba(0,0,0,0.06); }
  #sheet-handle { display: none; } #sheet-header { padding-top: 16px; }
  #sheet-header h2 { display:block!important; font-size:22px; font-weight:300; color:#8b1a2b; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  #sheet-header .desktop-sub { display:block!important; }

  #filter-bar { display: none; } #topbar { display: none; } #map { left: 400px; }
  .fab-group { bottom: 24px; } #legend-panel { bottom: 140px; } .leaflet-control-zoom { display: block; }
}

  const c=regionColors[aoc.region];
  const p=L.polygon(aoc.coords,{color:c,weight:1.5,opacity:0.7,fillColor:c,fillOpacity:0.12});
  p.bindPopup(`<b>${aoc.name} AOC</b><br><span style="color:#888;font-size:12px">Village Appellation</span>`,{closeButton:false});
  const center=p.getBounds().getCenter();
  aocLayer.addLayer(p);
  aocLayer.addLayer(L.marker(center,{interactive:false,icon:L.divIcon({className:'',html:`<div style="color:${c};font-size:10px;font-weight:700;white-space:nowrap;text-shadow:0 0 4px #fff,0 0 8px #fff;pointer-events:none;opacity:0.8">${aoc.name}</div>`,iconSize:[0,0],iconAnchor:[0,6]})}));
});
aocLayer.addTo(map);

// GC layer
const gcLayer=L.layerGroup();
grandCrus.forEach(gc=>{
  const m=L.circleMarker([gc.lat,gc.lng],{radius:4,fillColor:"#8b1a2b",color:"#8b1a2b",weight:1.5,opacity:0.9,fillOpacity:0.5});
  m.bindPopup(`<b>${gc.name}</b><br><span style="color:#8b1a2b;font-size:12px;font-weight:600">Grand Cru</span>`,{closeButton:false});
  m._gcName=gc.name;
  gcLayer.addLayer(m);
  const label=L.marker([gc.lat,gc.lng],{interactive:false,icon:L.divIcon({className:'gc-label',html:gc.name,iconSize:[0,0],iconAnchor:[-6,4]})});
  label._isGcLabel=true;
  gcLayer.addLayer(label);
});
gcLayer.addTo(map);
function updateGcLabels(){const z=map.getZoom();gcLayer.eachLayer(l=>{if(l._isGcLabel){const el=l.getElement();if(el)el.style.display=z>=14?'':'none';}});}
map.on('zoomend',updateGcLabels);
setTimeout(updateGcLabels,100);

// Estate markers
const markers=[];
function getAocCenter(v){const a=appellations.find(x=>x.name===v);if(!a)return null;const p=L.polygon(a.coords);const c=p.getBounds().getCenter();return[c.lat,c.lng];}
function getOffset(e){const s=estates.filter(x=>x.village===e.village);const i=s.indexOf(e);if(s.length<=1)return[0,0];const a=(i/s.length)*Math.PI*2;const r=0.002+(s.length>8?0.001*Math.floor(i/8):0);return[Math.cos(a)*r,Math.sin(a)*r];}

estates.forEach(estate=>{
  const coords=getAocCenter(estate.village);if(!coords)return;
  const off=getOffset(estate);const color=gradeColors[estate.grade];
  const marker=L.circleMarker([coords[0]+off[0],coords[1]+off[1]],{radius:gradeSizes[estate.grade],fillColor:color,color:color,weight:estate.grade===3?2.5:1.5,opacity:0.95,fillOpacity:0.75}).addTo(map);
  marker.on('click',()=>showDetail(estates.indexOf(estate)));
  marker.estateData=estate;
  markers.push(marker);
});

// Sheet drag
const sheet=document.getElementById('sheet');const handle=document.getElementById('sheet-handle');
let sheetState='peek',startY=0,startTranslate=0,isDragging=false;
function getSheetTranslate(){const h=sheet.offsetHeight;if(sheetState==='peek')return h-140;if(sheetState==='half')return h*0.5;return 0;}
handle.addEventListener('touchstart',e=>{isDragging=true;startY=e.touches[0].clientY;startTranslate=getSheetTranslate();sheet.style.transition='none';},{passive:true});
document.addEventListener('touchmove',e=>{if(!isDragging)return;sheet.style.transform=`translateY(${Math.max(0,startTranslate+e.touches[0].clientY-startY)}px)`;},{passive:true});
document.addEventListener('touchend',()=>{if(!isDragging)return;isDragging=false;sheet.style.transition='';const t=parseFloat(sheet.style.transform.replace(/[^0-9.-]/g,''))||0;const r=t/sheet.offsetHeight;sheetState=r<0.25?'full':r<0.6?'half':'peek';sheet.className=sheetState;});
map.on('click',e=>{if(e.originalEvent&&e.originalEvent.target.closest&&e.originalEvent.target.closest('.leaflet-popup'))return;if(sheetState!=='peek'){sheetState='peek';sheet.className='peek';}document.getElementById('legend-panel').classList.remove('show');});

// Layer toggles
document.getElementById('btn-aoc').addEventListener('click',function(){if(map.hasLayer(aocLayer)){map.removeLayer(aocLayer);this.classList.remove('on');}else{map.addLayer(aocLayer);this.classList.add('on');}});
document.getElementById('btn-gc').addEventListener('click',function(){if(map.hasLayer(gcLayer)){map.removeLayer(gcLayer);this.classList.remove('on');}else{map.addLayer(gcLayer);this.classList.add('on');setTimeout(updateGcLabels,50);}});
document.getElementById('btn-legend').addEventListener('click',()=>document.getElementById('legend-panel').classList.toggle('show'));

// Detail view
const listView=document.getElementById('list-view');
const detailView=document.getElementById('detail-view');
let currentView='list';

function showDetail(idx){
  const e=estates[idx];
  const vines=vineyardData[e.name]||[];
  const gcCount=vines.filter(v=>v.startsWith('GC:')).length;
  const pCount=vines.filter(v=>v.startsWith('1er:')).length;
  const vCount=vines.filter(v=>v.startsWith('V:')).length;
  const color=gradeColors[e.grade];
  const emoji=e.grade===3?"&#127815;&#127815;&#127815;":e.grade===2?"&#127815;&#127815;":e.grade===1?"&#127815;":"&#9733;";

  let html=`<div class="detail-back" onclick="showList()">&#8592; Back to list</div>`;
  html+=`<div class="detail-header">`;
  html+=`<div class="d-name">${e.name}</div>`;
  html+=`<div class="d-aoc">${e.village} AOC &middot; ${e.region}</div>`;
  html+=`<div class="d-badge"><span class="grape-badge grape-${e.grade}">${emoji} ${gradeLabels[e.grade]}</span></div>`;
  html+=`</div>`;

  if(vines.length>0){
    html+=`<div class="detail-section"><h3>Vineyards${gcCount?` &middot; GC ${gcCount}`:''} ${pCount?` &middot; 1er ${pCount}`:''}</h3>`;
    vines.forEach(v=>{
      let type,cls,name;
      if(v.startsWith('GC:')){type='GC';cls='vy-gc';name=v.slice(3);}
      else if(v.startsWith('1er:')){type='1er';cls='vy-1er';name=v.slice(4);}
      else{type='V';cls='vy-v';name=v.slice(2);}
      html+=`<div class="vineyard-item"><span class="vy-type ${cls}">${type}</span><span class="vy-name">${name}</span></div>`;
    });
    html+=`</div>`;
  }

  detailView.innerHTML=html;
  listView.style.display='none';
  detailView.classList.add('show');
  currentView='detail';

  // Expand sheet
  sheetState='half';
  sheet.className='half';

  // Pan map
  const m=markers[idx];
  if(m)setTimeout(()=>{map.setView(m.getLatLng(),14,{animate:true});},200);

  // Highlight GC markers on map that this estate owns
  gcLayer.eachLayer(l=>{
    if(l._gcName){
      const owned=vines.some(v=>v.includes(l._gcName));
      l.setStyle({fillOpacity:owned?1:0.2,opacity:owned?1:0.3,radius:owned?7:4});
    }
  });
}

function showList(){
  detailView.classList.remove('show');
  listView.style.display='';
  currentView='list';
  // Reset GC highlights
  gcLayer.eachLayer(l=>{if(l._gcName)l.setStyle({fillOpacity:0.5,opacity:0.9,radius:4});});
}

// Render list
function renderList(filter){
  const filtered=filter==='all'?estates:estates.filter(e=>String(e.grade)===filter);
  const stats=document.getElementById('sheet-stats');
  const rc={};filtered.forEach(e=>{rc[e.region]=(rc[e.region]||0)+1;});
  stats.textContent=`${filtered.length} estates — `+Object.entries(rc).map(([r,c])=>`${r}: ${c}`).join(', ');

  listView.innerHTML=filtered.map(e=>{
    const vines=vineyardData[e.name]||[];
    const gc=vines.filter(v=>v.startsWith('GC:')).length;
    const p=vines.filter(v=>v.startsWith('1er:')).length;
    const summary=[];if(gc)summary.push(`GC ${gc}`);if(p)summary.push(`1er ${p}`);
    return `<div class="estate-item" data-index="${estates.indexOf(e)}">
      <div class="estate-grade-dot" style="background:${gradeColors[e.grade]}"></div>
      <div class="estate-info">
        <div class="estate-name">${e.name}</div>
        <div class="estate-meta">${e.village} AOC${summary.length?' &middot; '+summary.join(' &middot; '):''}</div>
      </div>
      <span class="grape-badge grape-${e.grade}">${gradeLabels[e.grade]}</span>
    </div>`;
  }).join('');

  listView.querySelectorAll('.estate-item').forEach(item=>{
    item.addEventListener('click',()=>showDetail(parseInt(item.dataset.index)));
  });

  markers.forEach(m=>{
    const show=filter==='all'||String(m.estateData.grade)===filter;
    m.setStyle({opacity:show?0.95:0.08,fillOpacity:show?0.75:0.04});
    m.setRadius(show?gradeSizes[m.estateData.grade]:3);
  });

  if(currentView==='detail')showList();
}

document.querySelectorAll('.filter-chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll(`.filter-chip[data-filter="${btn.dataset.filter}"]`).forEach(b=>b.classList.add('active'));
    renderList(btn.dataset.filter);
  });
});

renderList('all');
</script>
</body>
</html>
