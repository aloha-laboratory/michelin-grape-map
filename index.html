<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #fafafa;
  color: #333;
}

/* === MAP === */
#map {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
}

/* === TOP BAR (floating) === */
#topbar {
  position: fixed;
  top: env(safe-area-inset-top, 0);
  left: 0; right: 0;
  z-index: 1000;
  padding: 12px 16px 0;
  pointer-events: none;
}
#title-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 12px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  pointer-events: auto;
}
#title-card h1 {
  font-size: 17px;
  font-weight: 700;
  color: #8b1a2b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
#title-card p {
  font-size: 11px;
  color: #999;
  margin-top: 2px;
  letter-spacing: 0.5px;
}

/* === FILTER CHIPS (floating) === */
#filter-bar {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 72px);
  left: 0; right: 0;
  z-index: 1000;
  padding: 0 16px;
  pointer-events: none;
}
#filter-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  pointer-events: auto;
  padding: 4px 0;
}
#filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  color: #666;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-chip.active {
  background: #8b1a2b;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(139,26,43,0.3);
}

/* === BOTTOM SHEET === */
#sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 1000;
  background: #fff;
  border-radius: 18px 18px 0 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 75vh;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
#sheet.peek { transform: translateY(calc(100% - 140px)); }
#sheet.half { transform: translateY(calc(100% - 50vh)); }
#sheet.full { transform: translateY(0); }

#sheet-handle {
  display: flex;
  justify-content: center;
  padding: 10px 0 6px;
  cursor: grab;
}
#sheet-handle .bar {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: #d0d0d0;
}

#sheet-header {
  padding: 0 20px 12px;
}
#sheet-stats {
  font-size: 12px;
  color: #999;
  margin-bottom: 8px;
}

#estate-list {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
}
.estate-item {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid #f2f2f2;
  cursor: pointer;
  transition: background 0.15s;
  gap: 12px;
}
.estate-item:active { background: #f7f3f0; }
.estate-item.highlight { background: #fdf6f0; }

.estate-grade-dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.estate-info { flex: 1; min-width: 0; }
.estate-name {
  font-size: 15px;
  font-weight: 600;
  color: #2c2c2c;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.estate-meta {
  font-size: 12px;
  color: #999;
  margin-top: 2px;
}

.grape-badge {
  flex-shrink: 0;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.grape-3 { background: #fdf6e3; color: #b8860b; }
.grape-2 { background: #f3eeff; color: #7c3aed; }
.grape-1 { background: #eff6ff; color: #2563eb; }
.grape-s { background: #ecfdf5; color: #059669; }

/* === LEGEND TOGGLE === */
#legend-btn {
  position: fixed;
  bottom: 152px;
  right: 16px;
  z-index: 999;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
#legend-btn:active { transform: scale(0.9); }

#legend-panel {
  position: fixed;
  bottom: 200px;
  right: 16px;
  z-index: 999;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 14px 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  font-size: 12px;
  line-height: 24px;
  color: #555;
  display: none;
}
#legend-panel.show { display: block; }
#legend-panel h4 { color: #8b1a2b; margin-bottom: 4px; font-size: 13px; font-weight: 700; }
#legend-panel .dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}

/* === LEAFLET OVERRIDES === */
.leaflet-control-zoom { display: none; }
.leaflet-control-attribution {
  font-size: 9px !important;
  background: rgba(255,255,255,0.7) !important;
  padding: 2px 6px !important;
}

/* === DESKTOP (sidebar mode) === */
@media (min-width: 769px) {
  #topbar { left: 400px; }
  #filter-bar { left: 400px; }
  #sheet {
    left: 0;
    width: 400px;
    top: 0;
    bottom: 0;
    border-radius: 0;
    max-height: 100vh;
    transform: none !important;
    box-shadow: 2px 0 12px rgba(0,0,0,0.06);
  }
  #sheet-handle { display: none; }
  #sheet-header { padding-top: 16px; }
  #sheet-header h2 {
    display: block !important;
    font-size: 22px;
    font-weight: 300;
    color: #8b1a2b;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #sheet-header .desktop-sub {
    display: block !important;
  }
  #sheet .desktop-filters {
    display: flex !important;
    padding: 0 20px 12px;
    gap: 8px;
    flex-wrap: wrap;
  }
  #filter-bar { display: none; }
  #topbar { display: none; }
  #map { left: 400px; }
  #legend-btn { bottom: 24px; }
  #legend-panel { bottom: 72px; }
  .leaflet-control-zoom { display: block; }
}

const regionZones = {
  "Cote de Nuits": {
    color: "#c0392b",
    coords: [
      [47.305,4.935],[47.305,5.010],[47.260,5.005],[47.220,4.998],
      [47.190,4.985],[47.165,4.980],[47.130,4.975],[47.105,4.965],
      [47.105,4.910],[47.130,4.915],[47.165,4.920],[47.190,4.925],
      [47.220,4.935],[47.260,4.940],[47.305,4.935]
    ]
  },
  "Cote de Beaune": {
    color: "#d4880f",
    coords: [
      [47.105,4.965],[47.105,4.910],[47.080,4.820],[47.060,4.800],
      [47.035,4.795],[47.010,4.770],[46.985,4.730],[46.955,4.715],
      [46.930,4.700],[46.900,4.660],[46.880,4.660],[46.880,4.730],
      [46.900,4.760],[46.930,4.775],[46.955,4.790],[46.985,4.810],
      [47.010,4.840],[47.035,4.870],[47.060,4.870],[47.080,4.890],
      [47.105,4.965]
    ]
  },
  "Cote Chalonnaise": {
    color: "#27ae60",
    coords: [
      [46.880,4.660],[46.880,4.730],[46.870,4.760],[46.850,4.750],
      [46.830,4.745],[46.800,4.740],[46.770,4.745],[46.750,4.740],
      [46.750,4.680],[46.770,4.680],[46.800,4.680],[46.830,4.680],
      [46.850,4.670],[46.880,4.660]
    ]
  }
};

Object.entries(regionZones).forEach(([name, zone]) => {
  const polygon = L.polygon(zone.coords, {
    color: zone.color, weight: 2, opacity: 0.5,
    fillColor: zone.color, fillOpacity: 0.05, dashArray: '6,4'
  }).addTo(map);
  const center = polygon.getBounds().getCenter();
  L.marker(center, {
    interactive: false,
    icon: L.divIcon({
      className: '',
      html: `<div style="color:${zone.color};font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;text-shadow:0 0 4px rgba(255,255,255,0.95),0 0 8px rgba(255,255,255,0.8);pointer-events:none">${name}</div>`,
      iconSize: [0,0], iconAnchor: [0,0]
    })
  }).addTo(map);
});

// Village labels
const villageLabels = L.layerGroup();
Object.entries(villages).forEach(([name, coords]) => {
  if (name === "Marsannay") return;
  villageLabels.addLayer(L.marker(coords, {
    interactive: false,
    icon: L.divIcon({
      className: '',
      html: `<div style="color:#666;font-size:10px;font-weight:600;white-space:nowrap;text-shadow:0 0 3px rgba(255,255,255,0.95),0 0 6px rgba(255,255,255,0.8);pointer-events:none">${name}</div>`,
      iconSize: [0,0], iconAnchor: [-8,12]
    })
  }));
});
villageLabels.addTo(map);
map.on('zoomend', () => {
  if (map.getZoom() >= 12) { if (!map.hasLayer(villageLabels)) villageLabels.addTo(map); }
  else { if (map.hasLayer(villageLabels)) map.removeLayer(villageLabels); }
});

// Markers
const markers = [];
function getOffset(estate) {
  const same = estates.filter(e => e.village === estate.village);
  const idx = same.indexOf(estate);
  if (same.length <= 1) return [0,0];
  const angle = (idx / same.length) * Math.PI * 2;
  const r = 0.002 + (same.length > 8 ? 0.001 * Math.floor(idx/8) : 0);
  return [Math.cos(angle)*r, Math.sin(angle)*r];
}

estates.forEach(estate => {
  const coords = villages[estate.village];
  if (!coords) return;
  const off = getOffset(estate);
  const color = gradeColors[estate.grade];
  const marker = L.circleMarker([coords[0]+off[0], coords[1]+off[1]], {
    radius: gradeSizes[estate.grade],
    fillColor: color, color: color,
    weight: estate.grade === 3 ? 2 : 1,
    opacity: 0.9, fillOpacity: 0.7
  }).addTo(map);
  const emoji = estate.grade === 3 ? "&#127815;&#127815;&#127815;" : estate.grade === 2 ? "&#127815;&#127815;" : estate.grade === 1 ? "&#127815;" : "&#9733;";
  marker.bindPopup(`<div style="font-family:system-ui;min-width:160px"><div style="font-size:15px;font-weight:700;color:#222">${estate.name}</div><div style="font-size:12px;color:#888;margin:3px 0">${estate.village} &middot; ${estate.region}</div><div style="font-size:13px;color:${color};font-weight:600">${emoji} ${gradeLabels[estate.grade]}</div></div>`, { closeButton: false });
  marker.estateData = estate;
  markers.push(marker);
});

// Bottom sheet drag
const sheet = document.getElementById('sheet');
const handle = document.getElementById('sheet-handle');
let sheetState = 'peek'; // peek, half, full
let startY = 0, startTranslate = 0, isDragging = false;

function getSheetTranslate() {
  const h = sheet.offsetHeight;
  if (sheetState === 'peek') return h - 140;
  if (sheetState === 'half') return h * 0.5;
  return 0;
}

handle.addEventListener('touchstart', e => {
  isDragging = true;
  startY = e.touches[0].clientY;
  startTranslate = getSheetTranslate();
  sheet.style.transition = 'none';
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dy = e.touches[0].clientY - startY;
  const newT = Math.max(0, startTranslate + dy);
  sheet.style.transform = `translateY(${newT}px)`;
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  sheet.style.transition = '';
  const currentT = parseFloat(sheet.style.transform.replace(/[^0-9.-]/g, '')) || 0;
  const h = sheet.offsetHeight;
  const ratio = currentT / h;
  if (ratio < 0.25) { sheetState = 'full'; }
  else if (ratio < 0.6) { sheetState = 'half'; }
  else { sheetState = 'peek'; }
  sheet.className = sheetState;
});

// Click map to collapse sheet
map.on('click', () => {
  if (sheetState !== 'peek') {
    sheetState = 'peek';
    sheet.className = 'peek';
  }
  document.getElementById('legend-panel').classList.remove('show');
});

// Render list
function renderList(filter) {
  const list = document.getElementById('estate-list');
  const filtered = filter === 'all' ? estates : estates.filter(e => String(e.grade) === filter);
  const stats = document.getElementById('sheet-stats');
  const rc = {};
  filtered.forEach(e => { rc[e.region] = (rc[e.region]||0)+1; });
  stats.textContent = `${filtered.length} estates — ` + Object.entries(rc).map(([r,c])=>`${r}: ${c}`).join(', ');

  list.innerHTML = filtered.map(e => `
    <div class="estate-item" data-index="${estates.indexOf(e)}">
      <div class="estate-grade-dot" style="background:${gradeColors[e.grade]}"></div>
      <div class="estate-info">
        <div class="estate-name">${e.name}</div>
        <div class="estate-meta">${e.village} &middot; ${e.region}</div>
      </div>
      <span class="grape-badge grape-${e.grade}">${gradeLabels[e.grade]}</span>
    </div>
  `).join('');

  list.querySelectorAll('.estate-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.index);
      const m = markers[idx];
      if (!m) return;
      sheetState = 'peek';
      sheet.className = 'peek';
      setTimeout(() => {
        map.setView(m.getLatLng(), 14, { animate: true });
        m.openPopup();
      }, 200);
      list.querySelectorAll('.estate-item').forEach(el => el.classList.remove('highlight'));
      item.classList.add('highlight');
    });
  });

  markers.forEach(m => {
    const show = filter === 'all' || String(m.estateData.grade) === filter;
    m.setStyle({ opacity: show ? 0.9 : 0.08, fillOpacity: show ? 0.7 : 0.04 });
    m.setRadius(show ? gradeSizes[m.estateData.grade] : 3);
  });
}

// Filter (both mobile chips and desktop chips)
document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    // Sync both mobile and desktop filter sets
    document.querySelectorAll(`.filter-chip[data-filter="${btn.dataset.filter}"]`).forEach(b => b.classList.add('active'));
    renderList(btn.dataset.filter);
  });
});

renderList('all');
</script>
